<!DOCTYPE html>
<html lang="vi">

<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8347855396412381"
    crossorigin="anonymous"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Sora:wght@300;400;600&display=swap"
    rel="stylesheet">

  <title>Chi tiết Design</title>
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/background.css">
  <link rel="stylesheet" href="assets/css/custom.css">
  <link rel="stylesheet" href="assets/css/footer.css">
  <link rel="stylesheet" href="assets/css/gallery.css">
  <link rel="stylesheet" href="assets/css/detail.css">
  <link rel="stylesheet" href="assets/css/winter.css">
</head>

<body>
  <!-- 🌀 Loader -->
  <div class="loader-container">
    <div class="loader">
      <div class="loader--dot"></div>
      <div class="loader--dot"></div>
      <div class="loader--dot"></div>
      <div class="loader--dot"></div>
      <div class="loader--dot"></div>
      <div class="loader--dot"></div>
      <div class="loader--text">Loading...</div>
    </div>
  </div>
  <script src="assets/js/custom.js"></script>
  <div class="snow" aria-hidden="true"></div>
  <!-- 🌀 End Loader -->
  <header>
    <a href="gallery.html" class="back-btn">&larr; Quay lại</a>
  </header>
  <div class="search-box">
    <img src="assets/logo-images/ogo52hzmisfit.png" alt="logo" class="logo-pulse" />
  </div>
  <div class="container">
    <h1>Chi tiết Thiết kế</h1><br>
    <main id="detailContainer"></main>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      fetch('assets/data/gallery.json')
        .then(res => res.json())
        .then(data => {
          const item = data.find(i => i.id.toLowerCase() === id.toLowerCase());
          const container = document.getElementById("detailContainer");

          if (item) {
            // Kiểm tra item.links (mảng) và render tất cả link
            let linksHTML = '';
            if (Array.isArray(item.links)) {
              linksHTML = item.links
                .map(link => `<a href="${link.url}" target="_blank" class="detail-link">${link.text}</a>`)
                .join(' ');
            }

            container.innerHTML = `
              <div class="detail-card">
                <img id="detailImage" src="${item.image}" alt="${item.title}">
                <h2>${item.title}</h2>
                <p>${item.description}</p>
                <div class="links-container">${linksHTML}</div>
              </div>
            `;
          } else {
            container.innerHTML = `<p class="lead">Không tìm thấy thông tin ảnh.</p>`;
          }
        })
        .catch(err => console.error('Lỗi load chi tiết:', err));
    });
  </script>
  <!-- 🐧 Footer -->
  <footer class="site-footer">
    <div class="footer-container">
      <!-- Cột trái: Lưu ý -->
      <div class="footer-left">
        <h3>Lưu ý nhỏ 🐧</h3>
        <p>Nếu có share Code AM cho ai thì Share Link Web nhé. không share code lẻ nhé điều này ảnh hưởng đến mình khá
          nhiều đó.</p>
      </div>

      <!-- Cột phải: Kết nối (Facebook) -->
      <div class="footer-right">
        <h3>Kết nối</h3>
        <a class="fb-footer" href="https://www.facebook.com/quoctuzn" target="_blank" aria-label="Facebook - QuocTuZN">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="fb-icon" width="28" height="28"
            fill="currentColor" aria-hidden="true">
            <path
              d="M22 12a10 10 0 1 0-11.5 9.9v-7H8v-3h2.5V9.5c0-2.5 1.5-3.9 3.7-3.9 1.1 0 2.2.2 2.2.2v2.4h-1.2c-1.2 0-1.6.8-1.6 1.6V12H21l-1.5 2.9h-2V22A10 10 0 0 0 22 12z" />
          </svg>
        </a>
      </div>
    </div>
  </footer>
  <!-- 🐧 End Footer -->
</body>

</html>
